name: Epic Request
description: Solicite a criação de um épico para agrupar funcionalidades relacionadas
title: "EP-0XX: "
assignees:
  [
    "theycelz",
    "jecelen",
    "GilvanFe",
    "GuilhermeCupertino",
    "Lucas",
    "marcelloAnth",
  ]
body:
  - type: textarea
    id: epic-description
    attributes:
      label: 🎯 Descrição do Épico
      description: Descreva o objetivo geral do épico e o valor de negócio que ele entrega.
      placeholder: "Exemplo: Sistema de autenticação completo que permita aos usuários acessar a aplicação de forma segura usando diferentes métodos de login."
    validations:
      required: true

  - type: input
    id: epic-code
    attributes:
      label: 📌 Código do Épico
      description: "Informe o identificador do épico, seguindo o padrão: EP-XX"
      placeholder: "EP-01"
    validations:
      required: true

  - type: textarea
    id: business-value
    attributes:
      label: 💼 Valor de Negócio
      description: Explique qual problema de negócio este épico resolve e qual o benefício esperado.
      placeholder: |
        Problema: Usuários têm dificuldade para acessar o sistema

        Benefício: Facilitar o acesso aumentando a adoção do sistema

        Impacto esperado: Redução de 50% nas chamadas de suporte relacionadas a login
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: ✅ Critérios de Aceitação do Épico
      description: Liste os critérios gerais que devem ser atendidos para considerar o épico completo.
      placeholder: |
        - Usuários podem fazer login com email e senha
        - Usuários podem fazer login com conta Google
        - Sistema possui recuperação de senha
        - Todas as funcionalidades são responsivas
        - Cobertura de testes de pelo menos 80%
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: ⚡ Prioridade
      description: Selecione a prioridade do épico no roadmap.
      options:
        - "Baixa"
        - "Média"
        - "Alta"
        - "Crítica"
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: 🔗 Dependências
      description: Liste outros épicos, sistemas ou recursos que são pré-requisitos para este épico.
      placeholder: |
        - EP-XX: Sistema de usuários deve estar implementado
        - Integração com API do Google deve estar disponível
        - Banco de dados deve suportar autenticação OAuth
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: 📎 Referências e Documentação
      description: Inclua links para documentação, wireframes, designs ou exemplos relevantes.
      placeholder: |
        - Link para documento de arquitetura
        - Wireframes no Figma
        - Exemplos de outros sistemas similares
    validations:
      required: false
